<!doctype html>
<html lang="pt-br">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles/index.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Space+Grotesk:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <title>Lista de compras</title>
  </head>
  <body>
    <header>
      <div class="logo">
        <img src="./assets/logo.svg" alt="Logo" />
      </div>

      <main>
        <div class="main-container">
          <div class="back-link">
            <span>← Voltar</span>
          </div>
          <h1>Compras da semana</h1>

          <form class="form-container">
            <div class="form-field">
              <label for="item">Adicione um novo item</label>
              <input type="text" id="item" placeholder="Adicione um novo item" required />
              <button type="submit" class="submit">Adicionar item</button>
            </div>
            <div class="item-list">
              <ul>
                <li>
                  <div class="item">
                    <input type="checkbox" />
                    <span>Pão de forma</span>
                  </div>
                  <button class="btn-delete">
                    <img src="./assets/dump-icon.svg" alt="Icone de lixeira" />
                  </button>
                </li>
                <li>
                  <div class="item">
                    <input type="checkbox" />
                    <span>Pão de forma</span>
                  </div>
                  <button class="btn-delete">
                    <img src="./assets/dump-icon.svg" alt="Icone de lixeira" />
                  </button>
                </li>
                <li>
                  <div class="item">
                    <input type="checkbox" />
                    <span>Pão de forma</span>
                  </div>
                  <button class="btn-delete">
                    <img src="./assets/dump-icon.svg" alt="Icone de lixeira" />
                  </button>
                </li>
              </ul>
            </div>

            <div class="alert-notification">
              <div class="notifications-left">
                <img src="./assets/alert-icon.svg" alt="Icone de alerta" />
                <span>O item foi removido da lista</span>
              </div>
              <button><img src="./assets/remove-icon.svg" alt="Icone de delete" /></button>
            </div>
          </form>
        </div>
      </main>
    </header>
  </body>
</html>
